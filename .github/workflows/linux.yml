name: Linux build

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux AppImage
    # Ubuntu 22.04 da glibc 2.35: el AppImage corre en Ubuntu 22.04+, Debian 12+,
    # Fedora 37+, openSUSE Tumbleweed, etc. Usar una base más vieja exigiría
    # cross-compilar en contenedor, fuera del alcance de este workflow.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libgl1-mesa-dev libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxcb-cursor0 \
            libfontconfig1 libdbus-1-3 \
            libfuse2 file wget imagemagick

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G Ninja
          -DQT_MAJOR=6
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel

      - name: Stage AppDir
        run: |
          cmake --install build --prefix "$PWD/AppDir/usr"

          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cat > AppDir/usr/share/applications/Chordy.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Chordy
          Comment=Editor de diagramas de acordes de guitarra
          Exec=Chordy
          Icon=Chordy
          Categories=AudioVideo;Music;
          Terminal=false
          EOF

          # Si no hay icono propio, generamos uno mínimo para satisfacer linuxdeploy.
          ICON_DST="AppDir/usr/share/icons/hicolor/256x256/apps/Chordy.png"
          if [ -f img/Chordy.png ]; then
            cp img/Chordy.png "$ICON_DST"
          else
            convert -size 256x256 xc:'#3a7bd5' \
              -gravity center -fill white \
              -font DejaVu-Sans-Bold -pointsize 160 -annotate +0+0 'C' \
              "$ICON_DST"
          fi

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        env:
          # linuxdeploy-plugin-qt usa QMAKE para localizar las libs de Qt; install-qt-action
          # ya pone qmake6 en el PATH, le pasamos la ruta absoluta para evitar ambigüedad.
          QMAKE: qmake6
          OUTPUT: Chordy-linux-x86_64.AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --desktop-file AppDir/usr/share/applications/Chordy.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/Chordy.png

          # linuxdeploy genera un nombre tipo "Chordy-x86_64.AppImage"; lo renombramos.
          mv Chordy-*x86_64.AppImage "$OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chordy-linux-x86_64
          path: Chordy-linux-x86_64.AppImage
