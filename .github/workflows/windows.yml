name: Windows build

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DQT_MAJOR=6
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Create deploy folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item build\Release\Chordy.exe package\
          if (Test-Path build\Release\resources) { Copy-Item build\Release\resources package\resources -Recurse }
          if (Test-Path build\Release\img) { Copy-Item build\Release\img package\img -Recurse }

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          windeployqt `
            --release `
            --compiler-runtime `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            --no-virtualkeyboard `
            --no-svg `
            --skip-plugin-types iconengines,generic,tls,networkinformation `
            --dir package `
            package\Chordy.exe

      - name: Trim unused image format plugins
        shell: pwsh
        run: |
          # Chordy solo usa PNG/BMP, que Qt soporta sin plugin externo.
          $keep = @()  # ningún plugin de imageformats es necesario
          $dir  = "package\imageformats"
          if (Test-Path $dir) {
            Get-ChildItem $dir -Filter *.dll | Where-Object { $keep -notcontains $_.Name } | Remove-Item -Force
            if (-not (Get-ChildItem $dir -Force | Where-Object { $_.Name -ne '.' -and $_.Name -ne '..' })) {
              Remove-Item $dir -Recurse -Force
            }
          }

      - name: Zip package
        shell: pwsh
        run: |
          Compress-Archive -Path package\* -DestinationPath Chordy-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chordy-windows-x64
          path: Chordy-windows-x64.zip
